name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install rio-cogeo rasterio pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onedir --windowed --collect-all rasterio --collect-all rio_cogeo cog_converter.py

    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: COG-Converter-Windows
        path: dist/cog_converter